name: SkycBlog
options:
  bundleIdPrefix: com.skyc8266.skycblog
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    OTHER_SWIFT_FLAGS: "-Xfrontend -warn-long-function-bodies=300"

packages: {}

targets:
  SkycBlogCore:
    type: framework
    platform: macOS
    sources:
      - path: Core
    settings:
      base:
        PRODUCT_NAME: SkycBlogCore
        PRODUCT_BUNDLE_IDENTIFIER: com.skyc8266.skycblog.SkycBlogCore
        SKIP_INSTALL: NO
        DEFINES_MODULE: YES
        INSTALL_PATH: "@rpath"
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"

  blog:
    type: tool
    platform: macOS
    sources:
      - path: CLI
    resources:
      - path: themes/default
    dependencies:
      - target: SkycBlogCore
        embed: true
        link: true
    settings:
      base:
        PRODUCT_NAME: blog
        PRODUCT_BUNDLE_IDENTIFIER: com.skyc8266.skycblog.cli
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path"
          - "@executable_path/../Frameworks"

  SkycBlogApp:
    type: application
    platform: macOS
    sources:
      - path: App
    resources:
      - path: Resources
    dependencies:
      - target: SkycBlogCore
        embed: true
    info:
      path: App/Info.plist
      properties:
        CFBundleName: SkycBlog
        CFBundleDisplayName: SkycBlog
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        PRODUCT_NAME: SkycBlog
        PRODUCT_BUNDLE_IDENTIFIER: com.skyc8266.skycblog.app
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/SkycBlog.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
